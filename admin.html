<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="관리자"/>
<title>관리자 모드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--green:#1D9E75;--green-dark:#0F6E56;--green-deeper:#085041;--green-bg:#E1F5EE;--green-border:#9FE1CB;--red-bg:#FCEBEB;--red-text:#501313;--gray-bg:#F5F5F3;--border:#E0E0DC;--border-light:#EBEBEA;--text:#1A1A1A;--text-sub:#666660;--text-hint:#999994;--white:#FFFFFF;--radius:12px;--radius-sm:8px;--blue:#378ADD;--blue-bg:#E6F1FB;--amber:#D97706;--amber-bg:#FEF3C7}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,'Noto Sans KR',sans-serif}

/* 로그인 */
#loginScreen{min-height:100vh;background:var(--gray-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-logo{width:64px;height:64px;background:var(--green);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 24px rgba(29,158,117,0.3)}
.login-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center}
.login-sub{font-size:14px;color:var(--text-hint);margin-bottom:32px;text-align:center}
.login-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:100%;max-width:360px}
.fl{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:6px;display:block;margin-top:12px}
.fl:first-child{margin-top:0}
.fi{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;font-size:16px;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;font-family:inherit;transition:border-color 0.15s}
.fi:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);color:#fff;border:none;margin-top:16px;border-radius:var(--radius);padding:14px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(29,158,117,0.3)}
.login-btn:active{opacity:0.85}
.login-err{font-size:13px;color:#E24B4A;text-align:center;margin-top:10px;display:none}

/* 앱 */
#adminApp{display:none;background:var(--gray-bg);min-height:100vh}
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;cursor:pointer;color:var(--text-hint);font-size:9px;font-weight:500;transition:color 0.15s;position:relative}
.tab-item.active{color:var(--green)}
.tab-item svg{width:20px;height:20px}
.tab-badge{position:absolute;top:6px;right:calc(50% - 14px);background:#E24B4A;color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.page{display:none;flex-direction:column;min-height:100vh;padding-bottom:calc(64px + env(safe-area-inset-bottom));background:var(--gray-bg)}
.page.active{display:flex}
.top-bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.top-bar-title{font-size:17px;font-weight:700;color:var(--text)}
.top-bar-sub{font-size:11px;color:var(--text-sub);margin-top:2px}
.top-bar-btns{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--gray-bg);border:none;border-radius:8px;padding:7px 10px;font-size:16px;cursor:pointer}
.logout-btn{background:var(--gray-bg);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--text-sub);cursor:pointer}
.scroll-area{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px}

/* 카드 */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:4px;height:14px;background:var(--green);border-radius:2px;display:block}

/* 통계 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:11px;color:var(--text-hint);font-weight:500}
.stat-value{font-size:20px;font-weight:700;color:var(--text);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text-sub);margin-top:2px}
.cg{color:var(--green)}.cr{color:#E24B4A}

/* 기록 리스트 */
.rec-list{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.rec-item{padding:12px 14px;border-bottom:1px solid var(--border-light);cursor:pointer}
.rec-item:last-child{border-bottom:none}
.rec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.rec-left{flex:1;min-width:0}
.w-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:3px}
.rec-work{font-size:13px;font-weight:600;color:var(--text)}
.rec-date{font-size:11px;color:var(--text-sub);margin-top:2px}
.rec-addr{font-size:11px;color:var(--text-hint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-right{text-align:right;flex-shrink:0}
.rec-amt{font-size:13px;font-weight:700;color:var(--text)}
.rec-pay{font-size:11px;color:var(--text-sub);margin-top:2px}
.paid-y{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:3px;background:var(--green-bg);color:var(--green-deeper)}
.paid-n{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:3px;background:var(--red-bg);color:var(--red-text)}
.rec-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.rec-detail.open{display:block}
.rec-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rec-detail-box{background:var(--gray-bg);border-radius:8px;padding:10px}
.rec-detail-label{font-size:10px;color:var(--text-hint);margin-bottom:3px}
.rec-detail-val{font-size:13px;font-weight:600;color:var(--text)}
.rec-memo{margin-top:6px;background:var(--gray-bg);border-radius:8px;padding:10px}

/* 출장 일정 */
.plan-item-row{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-light);cursor:pointer}
.plan-item-row:last-child{border-bottom:none}
.plan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plan-info{flex:1;min-width:0}
.plan-work{font-size:13px;font-weight:600;color:var(--text)}
.plan-addr{font-size:11px;color:var(--text-sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-time{font-size:11px;font-weight:600;color:var(--green-dark);background:var(--green-bg);padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.plan-detail-box{background:var(--gray-bg);border-radius:8px;padding:10px;margin-top:8px;display:none}
.plan-detail-box.open{display:block}
.plan-detail-row{font-size:12px;color:var(--text-sub);margin-bottom:4px;display:flex;gap:8px}
.plan-detail-row:last-child{margin-bottom:0}
.plan-detail-row b{color:var(--text-hint);min-width:44px;font-weight:500}

/* 작업자 카드 */
.worker-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.worker-card.expanded{border-color:var(--green)}
.worker-card-header{display:flex;align-items:center;gap:12px}
.w-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.w-info{flex:1;min-width:0}
.w-name{font-size:14px;font-weight:700;color:var(--text)}
.w-meta{font-size:11px;color:var(--text-sub);margin-top:2px}
.w-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:3px}
.w-stats{text-align:right;flex-shrink:0}
.w-amt{font-size:13px;font-weight:700;color:var(--green)}
.w-cnt{font-size:11px;color:var(--text-hint);margin-top:2px}
.worker-plans{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)}
.worker-plans.open{display:block}
.worker-plan-item{padding:8px 0;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px}
.worker-plan-item:last-child{border-bottom:none}

/* 지도 */
.map-container{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.map-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
.map-title{font-size:13px;font-weight:600;color:var(--text-sub);display:flex;align-items:center;gap:6px}
.map-title::before{content:'';width:4px;height:14px;background:var(--blue);border-radius:2px;display:block}
#locationMap{height:240px;width:100%}
.loc-offline{text-align:center;padding:16px;color:var(--text-hint);font-size:12px}

/* 오더 */
.order-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.order-card.status-new{border-left:3px solid #E24B4A}
.order-card.status-viewed{border-left:3px solid var(--amber)}
.order-card.status-done{border-left:3px solid var(--green)}
.order-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.order-work{font-size:14px;font-weight:700;color:var(--text)}
.order-addr{font-size:12px;color:var(--text-sub);margin-top:3px}
.order-meta{font-size:11px;color:var(--text-hint);margin-top:3px}
.order-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-new{background:var(--red-bg);color:var(--red-text)}
.badge-viewed{background:var(--amber-bg);color:var(--amber)}
.badge-done{background:var(--green-bg);color:var(--green-deeper)}
.order-footer{display:flex;gap:8px;margin-top:10px}
.order-btn{flex:1;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer}
.order-btn-del{background:var(--red-bg);color:var(--red-text)}
.order-btn-done{background:var(--green-bg);color:var(--green-deeper)}
.fab{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));right:18px;width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:24px;cursor:pointer;z-index:90;box-shadow:0 4px 16px rgba(29,158,117,0.4);display:none}
.fab.show{display:flex;align-items:center;justify-content:center}

/* 필터 */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.f-chip{border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text-sub);background:var(--white);cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.f-chip.active{border-color:var(--green);background:var(--green-bg);color:var(--green-deeper)}
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.date-row input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;font-family:inherit}
.date-row input:focus{border-color:var(--green)}
.date-sep{font-size:13px;color:var(--text-hint)}

/* 공지 */
.notice-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.notice-head{background:var(--green);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.notice-head span{font-size:13px;font-weight:700;color:#fff}
.notice-edit-btn{font-size:12px;color:rgba(255,255,255,0.85);background:none;border:none;cursor:pointer;font-weight:600}
.notice-body{padding:12px 14px;font-size:14px;color:var(--text);line-height:1.6}
.notice-ta{width:100%;border:none;outline:none;font-size:14px;color:var(--text);line-height:1.6;resize:none;height:80px;padding:12px 14px;font-family:inherit;display:none}
.notice-save-btn{background:var(--green);color:#fff;border:none;padding:10px;font-size:13px;font-weight:600;cursor:pointer;width:100%;display:none}

/* 엑셀 버튼 */
.excel-btn{background:var(--white);color:var(--green-dark);border:1.5px solid var(--green);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none}
.excel-btn:active{background:var(--green-bg)}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center}
.modal-label{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:5px;display:block;margin-top:12px}
.modal-label:first-of-type{margin-top:0}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;color:var(--text);background:var(--white);outline:none;font-family:inherit;-webkit-appearance:none}
.modal-input:focus{border-color:var(--green)}
.modal-select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;font-size:15px;color:var(--text);background:var(--white);outline:none;font-family:inherit;-webkit-appearance:none}
.modal-select:focus{border-color:var(--green)}
.modal-ta{resize:none;height:70px;line-height:1.5}
.modal-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.modal-cancel{background:var(--gray-bg);color:var(--text-sub);border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.modal-save{background:var(--green);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none}

/* 기타 */
.empty{text-align:center;padding:28px;color:var(--text-hint);font-size:13px}
.empty-icon{font-size:34px;margin-bottom:8px}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:12px 22px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.wc0{background:#E1F5EE;color:#085041}.wc1{background:#E6F1FB;color:#042C53}.wc2{background:#FAEEDA;color:#412402}.wc3{background:#FBEAF0;color:#4B1528}.wc4{background:#EAF3DE;color:#173404}
.divider{height:1px;background:var(--border-light);margin:12px 0}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </div>
  <div class="login-title">관리자 모드</div>
  <div class="login-sub">출장 업무 통합 관리</div>
  <div class="login-card">
    <label class="fl">아이디</label>
    <input class="fi" type="text" id="loginId" placeholder="admin" autocomplete="off"/>
    <label class="fl">비밀번호</label>
    <input class="fi" type="password" id="loginPw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">아이디 또는 비밀번호가 틀렸습니다</div>
  </div>
</div>

<div id="adminApp">

  <!-- 대시보드 -->
  <div class="page active" id="page-dash">
    <div class="top-bar">
      <div><div class="top-bar-title"><span class="live-dot"></span>대시보드</div><div class="top-bar-sub" id="dashDate"></div></div>
      <div class="top-bar-btns">
        <button class="icon-btn" onclick="openSettings()" title="설정">⚙️</button>
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
    <div class="scroll-area">
      <div class="notice-card">
        <div class="notice-head"><span>📢 공지사항</span><button class="notice-edit-btn" onclick="toggleNotice()">수정</button></div>
        <div class="notice-body" id="noticeBody">오늘도 안전하게 출장 다녀오세요!</div>
        <textarea class="notice-ta" id="noticeTa" placeholder="공지 내용 입력..."></textarea>
        <button class="notice-save-btn" id="noticeSaveBtn" onclick="saveNotice()">저장 · 작업자에게 알림 발송</button>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">오늘 매출</div><div class="stat-value cg" id="dAmt">0</div><div class="stat-sub">원</div></div>
        <div class="stat-card"><div class="stat-label">오늘 건수</div><div class="stat-value" id="dCount">0</div><div class="stat-sub">건</div></div>
        <div class="stat-card"><div class="stat-label">이번 달 매출</div><div class="stat-value cg" id="dMonth">0</div><div class="stat-sub">원</div></div>
        <div class="stat-card"><div class="stat-label">미입금</div><div class="stat-value cr" id="dUnpaid">0</div><div class="stat-sub">건</div></div>
      </div>
      <div class="card"><div class="card-title">오늘 출장 일정</div><div id="dashPlans"></div></div>
      <div class="card"><div class="card-title">오늘 완료 기록</div><div id="dashRecs"></div></div>
    </div>
  </div>

  <!-- 작업자 -->
  <div class="page" id="page-workers">
    <div class="top-bar">
      <div><div class="top-bar-title">작업자 현황</div><div class="top-bar-sub" id="wSub"></div></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="scroll-area">
      <div id="wCards"></div>
      <div class="map-container">
        <div class="map-header">
          <div class="map-title">실시간 위치</div>
          <span id="mapUpdated" style="font-size:11px;color:var(--text-hint)"></span>
        </div>
        <div id="locationMap"></div>
        <div class="loc-offline" id="locOffline" style="display:none">위치 정보가 없습니다<br/><span style="font-size:11px">작업자 앱에서 위치 공유 시 표시됩니다</span></div>
      </div>
      <div class="card">
        <div class="card-title">기록 조회</div>
        <div class="filter-row" id="wFilter" style="margin-bottom:12px"></div>
        <div id="wRecs"></div>
      </div>
    </div>
  </div>

  <!-- 오더 -->
  <div class="page" id="page-orders">
    <div class="top-bar">
      <div><div class="top-bar-title">오더 관리</div><div class="top-bar-sub" id="orderSub"></div></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="scroll-area">
      <div class="filter-row" id="orderFilter" style="margin-bottom:4px"></div>
      <div id="orderList"></div>
    </div>
    <button class="fab show" id="orderFab" onclick="openOrderModal()">+</button>
  </div>

  <!-- 전체 기록 -->
  <div class="page" id="page-records">
    <div class="top-bar">
      <div><div class="top-bar-title">전체 기록</div><div class="top-bar-sub" id="rSub"></div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGvmykxwcwBHP_D1Rg755UBIiJHK43bkg",
  authDomain: "nanbangyulsa.firebaseapp.com",
  projectId: "nanbangyulsa",
  storageBucket: "nanbangyulsa.firebasestorage.app",
  messagingSenderId: "491847724922",
  appId: "1:491847724922:web:7b10162265fd54ddfe70c3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ── 상태 ── */
let records=[], plans=[], orders=[], locations=[];
let selW='전체', selRW='전체', selOrder='전체';
let adminPw = '1234';
const today = new Date().toISOString().slice(0,10);
const thisMonth = today.slice(0,7);
const workerMap = {};
let mapInstance = null, workerMarkers = {};

/* ── 유틸 ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function wc(name){const list=Object.keys(workerMap);return 'wc'+(list.indexOf(name)%5);}
function fmtTimeRange(p){const s=p.timeStart||p.time||'';const e=p.timeEnd||'';if(s&&e)return s+'~'+e;return s||e;}

/* ── 인증 ── */
window.doLogin = async function(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  // Firebase에서 비밀번호 가져오기
  try {
    const snap = await getDoc(doc(db,'settings','adminPw'));
    if(snap.exists()) adminPw = snap.data().pw;
  } catch(e){}
  if(id==='admin' && pw===adminPw){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='block';
    initApp();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPw').value='';
  }
};
window.doLogout = function(){
  if(!confirm('로그아웃 하시겠습니까?'))return;
  document.getElementById('adminApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').style.display='none';
};

/* ── 설정 (비번 변경) ── */
window.openSettings = function(){ document.getElementById('settingsModal').classList.add('open'); };
window.closeSettings = function(){
  document.getElementById('settingsModal').classList.remove('open');
  ['curPw','newPw','newPw2'].forEach(id=>document.getElementById(id).value='');
};
window.changePw = async function(){
  const cur=document.getElementById('curPw').value;
  const nw=document.getElementById('newPw').value;
  const nw2=document.getElementById('newPw2').value;
  if(cur!==adminPw){showToast('현재 비밀번호가 틀렸습니다');return;}
  if(!nw||nw.length<4){showToast('새 비밀번호는 4자 이상');return;}
  if(nw!==nw2){showToast('새 비밀번호가 일치하지 않습니다');return;}
  await setDoc(doc(db,'settings','adminPw'),{pw:nw});
  adminPw=nw;
  closeSettings();
  showToast('✓ 비밀번호 변경 완료');
};

/* ── 탭 ── */
window.switchTab = function(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='workers'){renderWorkers();setTimeout(initMap,100);}
  if(tab==='records')renderAllRecs();
  if(tab==='orders')renderOrders();
};

/* ── 공지 ── */
let noticeEdit=false;
window.toggleNotice=function(){
  noticeEdit=!noticeEdit;
  document.getElementById('noticeBody').style.display=noticeEdit?'none':'block';
  document.getElementById('noticeTa').style.display=noticeEdit?'block':'none';
  document.getElementById('noticeSaveBtn').style.display=noticeEdit?'block':'none';
  if(noticeEdit)document.getElementById('noticeTa').value=document.getElementById('noticeBody').textContent;
};
window.saveNotice=async function(){
  const v=document.getElementById('noticeTa').value.trim();
  if(!v){showToast('공지 내용을 입력해주세요');return;}
  document.getElementById('noticeBody').textContent=v;
  await setDoc(doc(db,'settings','notice'),{text:v, updatedAt: serverTimestamp()});
  noticeEdit=false;window.toggleNotice();showToast('✓ 공지 저장 · 작업자 알림 발송!');
};

/* ── 초기화 ── */
async function initApp(){
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('dashDate').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  const noticeSnap=await getDoc(doc(db,'settings','notice'));
  if(noticeSnap.exists())document.getElementById('noticeBody').textContent=noticeSnap.data().text;
  try{const pwSnap=await getDoc(doc(db,'settings','adminPw'));if(pwSnap.exists())adminPw=pwSnap.data().pw;}catch(e){}
  initFilters();
  startListening();
}

function startListening(){
  onSnapshot(query(collection(db,'records'),orderBy('createdAt','desc')),snap=>{
    records=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildWorkerMap();renderDash();renderAllRecs();renderWorkers();
  });
  onSnapshot(query(collection(db,'plans'),orderBy('createdAt','asc')),snap=>{
    plans=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildWorkerMap();renderDash();renderWorkers();
  });
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    orders=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderOrders();
    const newCnt=orders.filter(o=>o.status==='new').length;
    const badge=document.getElementById('newOrderBadge');
    badge.style.display=newCnt>0?'flex':'none';
    badge.textContent=newCnt;
  });
  onSnapshot(collection(db,'locations'),snap=>{
    locations=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateMapMarkers();
    if(locations.length>0){
      const latest=locations.reduce((a,b)=>(a.timestamp?.seconds||0)>(b.timestamp?.seconds||0)?a:b,locations[0]);
      if(latest.timestamp){
        const d=new Date(latest.timestamp.seconds*1000);
        document.getElementById('mapUpdated').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} 기준`;
      }
    }
  });
}

function buildWorkerMap(){
  [...records,...plans,...orders].forEach(r=>{if(r.worker)workerMap[r.worker]=true;if(r.assignedTo)workerMap[r.assignedTo]=true;});
}

/* ── 대시보드 ── */
function renderDash(){
  const tR=records.filter(r=>r.date===today);
  const mR=records.filter(r=>r.date&&r.date.startsWith(thisMonth));
  document.getElementById('dAmt').textContent=tR.reduce((s,r)=>s+(r.amount||0),0).toLocaleString();
  document.getElementById('dCount').textContent=tR.length;
  document.getElementById('dMonth').textContent=mR.reduce((s,r)=>s+(r.amount||0),0).toLocaleString();
  document.getElementById('dUnpaid').textContent=records.filter(r=>!r.paid).length;

  const tP=plans.filter(p=>p.date===today).sort((a,b)=>(a.timeStart||a.time||'').localeCompare(b.timeStart||b.time||''));
  const pEl=document.getElementById('dashPlans');
  pEl.innerHTML=tP.length
    ?'<div class="rec-list">'+tP.map(p=>{
      const tr=fmtTimeRange(p);
      return `<div class="plan-item-row" onclick="togglePlanDetail('pd-${p.id}')">
        <div class="plan-dot" style="background:${p.done?'#999994':'#1D9E75'}"></div>
        <div class="plan-info">
          <div class="plan-work">${p.work||'작업 미정'}</div>
          <div class="plan-addr">${p.addr}</div>
          <div style="margin-top:3px"><span class="w-tag ${wc(p.worker)}">${p.worker}</span>${p.done?' <span style="font-size:10px;color:var(--text-hint)">완료</span>':''}</div>
        </div>
        ${tr?`<div class="plan-time">${tr}</div>`:''}
      </div>
      <div class="plan-detail-box" id="pd-${p.id}">
        ${p.phone?`<div class="plan-detail-row"><b>연락처</b><a href="tel:${p.phone}" style="color:var(--green);text-decoration:none">${p.phone} 📞</a></div>`:''}
        ${p.work?`<div class="plan-detail-row"><b>작업</b>${p.work}</div>`:''}
        ${p.memo?`<div class="plan-detail-row"><b>메모</b>${p.memo}</div>`:''}
      </div>`;
    }).join('')+'</div>'
    :'<div class="empty"><div class="empty-icon">📋</div>오늘 출장 일정 없음</div>';

  const rEl=document.getElementById('dashRecs');
  rEl.innerHTML=tR.length
    ?'<div class="rec-list">'+tR.map(r=>recHTML(r)).join('')+'</div>'
    :'<div class="empty"><div class="empty-icon">📝</div>오늘 완료 기록 없음</div>';
}

window.togglePlanDetail=function(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
};

/* ── 기록 HTML ── */
function recHTML(r){
  return `<div class="rec-item" onclick="toggleRecDetail('${r.id}')">
    <div class="rec-top">
      <div class="rec-left">
        <span class="w-tag ${wc(r.worker)}">${r.worker}</span>
        <div class="rec-work">${r.work}</div>
        <div class="rec-date">${r.date} ${r.time||''}</div>
        <div class="rec-addr">${r.address}</div>
      </div>
      <div class="rec-right">
        <div class="rec-amt">${r.amount?r.amount.toLocaleString()+'원':'-'}</div>
        <div class="rec-pay">${r.pay}</div>
        <span class="${r.paid?'paid-y':'paid-n'}">${r.paid?'입금완료':'미확인'}</span>
      </div>
    </div>
    <div class="rec-detail" id="rd-${r.id}">
      <div class="rec-detail-grid">
        <div class="rec-detail-box"><div class="rec-detail-label">연락처</div><div class="rec-detail-val">${r.phone?`<a href="tel:${r.phone}" style="color:var(--green);text-decoration:none">${r.phone} 📞</a>`:'-'}</div></div>
        <div class="rec-detail-box"><div class="rec-detail-label">결제</div><div class="rec-detail-val">${r.pay}${r.depositor?' ('+r.depositor+')':''}</div></div>
      </div>
      ${r.memo?`<div class="rec-memo"><div class="rec-detail-label">메모</div><div class="rec-detail-val" style="font-weight:400">${r.memo}</div></div>`:''}
    </div>
  </div>`;
}
window.toggleRecDetail=function(id){const el=document.getElementById('rd-'+id);if(el)el.classList.toggle('open');};

/* ── 작업자 현황 ── */
function renderWorkers(){
  const workers=Object.keys(workerMap);
  document.getElementById('wSub').textContent=`총 ${workers.length}명`;
  const chips=['전체',...workers];
  ['wFilter','rFilter'].forEach(fid=>{
    const cur=fid==='wFilter'?selW:selRW;
    document.getElementById(fid).innerHTML=chips.map(w=>`<button class="f-chip${w===cur?' active':''}" onclick="${fid==='wFilter'?'setWF':'setRF'}(this,'${w}')">${w}</button>`).join('');
  });
  document.getElementById('wCards').innerHTML=workers.map((w,i)=>{
    const recs=records.filter(r=>r.worker===w);
    const tR=recs.filter(r=>r.date===today);
    const tP=plans.filter(p=>p.worker===w&&p.date===today);
    const dP=tP.filter(p=>p.done).length;
    const tot=recs.reduce((s,r)=>s+(r.amount||0),0);
    const on=tR.length>0;
    const loc=locations.find(l=>l.worker===w);
    const locText=loc?'📍 위치 공유 중':'';
    const planItems=tP.map(p=>{
      const tr=fmtTimeRange(p);
      return `<div class="worker-plan-item">
        <div style="width:6px;height:6px;border-radius:50%;background:${p.done?'#999994':'#1D9E75'};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:${p.done?'var(--text-hint)':'var(--text)'}">${p.work||'작업 미정'}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.addr}</div>
        </div>
        ${tr?`<div style="font-size:10px;font-weight:600;color:var(--green-dark);background:var(--green-bg);padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0">${tr}</div>`:''}
        ${p.phone?`<a href="tel:${p.phone}" onclick="event.stopPropagation()" style="font-size:16px;text-decoration:none">📞</a>`:''}
      </div>`;
    }).join('');
    return `<div class="worker-card" id="wc-${i}" onclick="toggleWorkerPlans('${w}',${i})">
      <div class="worker-card-header">
        <div class="w-av wc${i%5}">${w[0]}</div>
        <div class="w-info">
          <div class="w-name">${w} ${locText}</div>
          <div class="w-meta">오늘 ${tR.length}건 · 일정 ${dP}/${tP.length}</div>
          <span class="w-badge" style="${on?'background:var(--green-bg);color:var(--green-deeper)':'background:var(--gray-bg);color:var(--text-hint)'}">${on?'작업중':'대기중'}</span>
        </div>
        <div class="w-stats">
          <div class="w-amt">${tot.toLocaleString()}원</div>
          <div class="w-cnt">누적 ${recs.length}건</div>
        </div>
      </div>
      <div class="worker-plans" id="wp-${i}">
        ${tP.length?planItems:'<div style="font-size:12px;color:var(--text-hint);padding:8px 0">오늘 일정 없음</div>'}
      </div>
    </div>`;
  }).join('');
  renderWRecs();
}

window.toggleWorkerPlans=function(worker, idx){
  const card=document.getElementById('wc-'+idx);
  const plans=document.getElementById('wp-'+idx);
  card.classList.toggle('expanded');
  plans.classList.toggle('open');
};

window.setWF=function(el,v){document.getElementById('wFilter').querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');selW=v;renderWRecs();};
function renderWRecs(){
  const list=(selW==='전체'?records:records.filter(r=>r.worker===selW)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('wRecs').innerHTML=list.length?'<div class="rec-list">'+list.map(r=>recHTML(r)).join('')+'</div>':'<div class="empty">기록 없음</div>';
}

/* ── 지도 ── */
function initMap(){
  if(mapInstance){
    setTimeout(()=>{ mapInstance.invalidateSize(); updateMapMarkers(); }, 200);
    return;
  }
  if(typeof L==='undefined'){ setTimeout(initMap, 500); return; }
  const mapEl = document.getElementById('locationMap');
  mapEl.style.display='block';
  document.getElementById('locOffline').style.display='none';
  mapInstance=L.map('locationMap',{zoomControl:true}).setView([37.5665,126.9780],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(mapInstance);
  setTimeout(()=>{ mapInstance.invalidateSize(); updateMapMarkers(); }, 300);
}

function updateMapMarkers(){
  if(!mapInstance) return;
  const workers=Object.keys(workerMap);
  const locEl=document.getElementById('locOffline');
  const validLocs = locations.filter(l=>l.lat&&l.lng);
  if(validLocs.length===0){
    locEl.style.display='block';
    document.getElementById('locationMap').style.display='none';
    return;
  }
  locEl.style.display='none';
  document.getElementById('locationMap').style.display='block';
  validLocs.forEach(loc=>{
    const wIdx=workers.indexOf(loc.worker);
    const color=['#085041','#042C53','#412402','#4B1528','#173404'][wIdx%5]||'#1D9E75';
    const icon=L.divIcon({className:'',html:`<div style="background:${color};color:#fff;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${loc.worker}</div>`,iconAnchor:[0,0]});
    if(workerMarkers[loc.worker]){
      workerMarkers[loc.worker].setLatLng([loc.lat,loc.lng]);
    } else {
      workerMarkers[loc.worker]=L.marker([loc.lat,loc.lng],{icon}).addTo(mapInstance).bindPopup(`${loc.worker}`);
    }
  });
  if(locations.length===1&&locations[0].lat){
    mapInstance.setView([locations[0].lat,locations[0].lng],13);
  }
}

/* ── 오더 ── */
window.openOrderModal=function(){
  const workers=Object.keys(workerMap);
  document.getElementById('orderWorker').innerHTML=workers.map(w=>`<option value="${w}">${w}</option>`).join('');
  document.getElementById('orderDate').value=today;
  ['orderAddr','orderPhone','orderMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('orderWork').value='';
  document.getElementById('orderModal').classList.add('open');
};
window.closeOrderModal=function(){document.getElementById('orderModal').classList.remove('open');};

window.saveOrder=async function(){
  const assignedTo=document.getElementById('orderWorker').value;
  const addr=document.getElementById('orderAddr').value.trim();
  if(!addr){showToast('주소를 입력해주세요');return;}
  try{
    await addDoc(collection(db,'orders'),{
      assignedTo,
      date:document.getElementById('orderDate').value,
      addr,
      phone:document.getElementById('orderPhone').value.trim(),
      work:document.getElementById('orderWork').value,
      memo:document.getElementById('orderMemo').value.trim(),
      status:'new',
      createdAt:serverTimestamp()
    });
    closeOrderModal();
    showToast('✓ 오더 발송 완료!');
  }catch(e){showToast('발송 실패: '+e.message);}
};

let selOrderFilter='전체';
window.setOrderFilter=function(el,v){
  document.getElementById('orderFilter').querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');selOrderFilter=v;renderOrders();
};

function renderOrders(){
  const workers=['전체',...Object.keys(workerMap)];
  document.getElementById('orderFilter').innerHTML=workers.map(w=>`<button class="f-chip${w===selOrderFilter?' active':''}" onclick="setOrderFilter(this,'${w}')">${w}</button>`).join('');
  const list=orders.filter(o=>selOrderFilter==='전체'||o.assignedTo===selOrderFilter);
  document.getElementById('orderSub').textContent=`총 ${list.length}건`;
  const el=document.getElementById('orderList');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>오더가 없습니다</div>';return;}
  el.innerHTML=list.map(o=>`
    <div class="order-card status-${o.status||'new'}">
      <div class="order-header">
        <div>
          <div class="order-work">${o.work||'작업 미정'}</div>
          <div class="order-addr">${o.addr}</div>
          <div class="order-meta">${o.date||''} · <span class="w-tag ${wc(o.assignedTo)}" style="font-size:10px">${o.assignedTo}</span>${o.phone?` · <a href="tel:${o.phone}" style="color:var(--green);text-decoration:none">${o.phone} 📞</a>`:''}</div>
          ${o.memo?`<div class="order-meta" style="margin-top:4px">📝 ${o.memo}</div>`:''}
        </div>
        <span class="order-badge ${o.status==='new'?'badge-new':o.status==='viewed'?'badge-viewed':'badge-done'}">${o.status==='new'?'신규':o.status==='viewed'?'확인':'완료'}</span>
      </div>
      <div class="order-footer">
        <button class="order-btn order-btn-del" onclick="deleteOrder('${o.id}')">🗑 삭제</button>
        ${o.status!=='done'?`<button class="order-btn order-btn-done" onclick="doneOrder('${o.id}')">✓ 완료처리</button>`:''}
      </div>
    </div>`).join('');
}

window.deleteOrder=async function(id){
  if(!confirm('이 오더를 삭제할까요?'))return;
  await deleteDoc(doc(db,'orders',id));showToast('✓ 삭제 완료');
};
window.doneOrder=async function(id){
  await updateDoc(doc(db,'orders',id),{status:'done'});showToast('✓ 완료 처리');
};

/* ── 전체 기록 ── */
function initFilters(){
  const d=new Date();d.setDate(1);
  document.getElementById('fFrom').value=d.toISOString().slice(0,10);
  document.getElementById('fTo').value=today;
  document.getElementById('fFrom').oninput=renderAllRecs;
  document.getElementById('fTo').oninput=renderAllRecs;
}
window.setRF=function(el,v){document.getElementById('rFilter').querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');selRW=v;renderAllRecs();};
function renderAllRecs(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const list=records.filter(r=>(!from||r.date>=from)&&(!to||r.date<=to)&&(selRW==='전체'||r.worker===selRW)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const tot=list.reduce((s,r)=>s+(r.amount||0),0);
  document.getElementById('rSub').textContent=`${list.length}건 · ${tot.toLocaleString()}원`;
  document.getElementById('allRecs').innerHTML=list.length?'<div class="rec-list">'+list.map(r=>recHTML(r)).join('')+'</div>':'<div class="empty"><div class="empty-icon">📋</div>조건에 맞는 기록이 없습니다</div>';
}

/* ── 엑셀 ── */
function dlBlob(blob,fname){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1500);}
window.exportExcel=function(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const list=records.filter(r=>(!from||r.date>=from)&&(!to||r.date<=to)&&(selRW==='전체'||r.worker===selRW)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const rows=list.map((r,i)=>({'No':list.length-i,'날짜':r.date,'시간':r.time||'','작업자':r.worker,'주소':r.address,'연락처':r.phone,'작업내용':r.work,'메모':r.memo||'','결제':r.pay,'금액(원)':r.amount||0,'입금확인':r.paid?'완료':'미확인'}));
  if(typeof XLSX!=='undefined'){
    try{
      const ws=XLSX.utils.json_to_sheet(rows);
      ws['!cols']=[{wch:4},{wch:12},{wch:8},{wch:10},{wch:28},{wch:15},{wch:14},{wch:20},{wch:8},{wch:12},{wch:10}];
      const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'전체기록',ws);
      const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      dlBlob(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),`관리자기록_${today.replace(/-/g,'')}.xlsx`);
      showToast('✓ 엑셀 저장 완료!');return;
    }catch(e){}
  }
  const h=['No','날짜','시간','작업자','주소','연락처','작업내용','메모','결제','금액(원)','입금확인'];
  const csv=[h.join(',')].concat(rows.map(r=>h.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))).join('\n');
  dlBlob(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}),`관리자기록_${today.replace(/-/g,'')}.csv`);
  showToast('✓ CSV 저장 완료!');
};
